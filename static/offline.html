<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Local video shelf</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        color: #fff;
        text-align: center;
        padding: 24px;
      }
      .container {
        max-width: 400px;
      }
      .icon {
        font-size: 4rem;
        margin-bottom: 24px;
        opacity: 0.9;
      }
      h1 {
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 12px;
        letter-spacing: -0.025em;
      }
      p {
        font-size: 1.125rem;
        opacity: 0.8;
        line-height: 1.6;
      }
      .retry-btn {
        margin-top: 32px;
        padding: 14px 32px;
        font-size: 1rem;
        font-weight: 600;
        color: #fff;
        background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        box-shadow: 0 4px 14px rgba(249, 115, 22, 0.4);
      }
      .retry-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(249, 115, 22, 0.5);
      }
      .retry-btn:active {
        transform: translateY(0);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">📡</div>
      <h1>Hello World!</h1>
      <p>The server is currently unavailable. Please check your connection and try again.</p>
      <button class="retry-btn" onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
